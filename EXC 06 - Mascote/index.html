    <title>Trabalho css 26 03</title>

    <style>
        body{
            background-image: url(Imagens-Mascote/Compactada/planeta.png);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

<body class="bg-pink-50 min-h-screen flex flex-col">

    <div class="w-full flex items-center justify-start p-4 gap-4">

    <div class="avatar">
      <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
        <img src="Imagens-Mascote/avatar.png" />
      </div>
    </div>

    <input 
      type="text" 
      placeholder="Nome da criatura..." 
      class="input input-secondary"
    />

  </div>

    <div class="flex flex-col items-center w-full px-4">

    <img 
      id="normal"
      src="Imagens-Mascote/Compactada/Mascote.png"
      alt="Imagem principal"
      class="w-full max-w-md h-auto"
    />

    
    <div class="mt-12 flex justify-center w-full">

      <img 
        id="comida"
        src="Imagens-Mascote/Compactada/mascote-comida-favorita.png"
        alt="Botão"
        class="w-1/3 max-w-[180px] h-auto active:scale-95 transition"
        onclick="alimentar()"
      />

    </div>
