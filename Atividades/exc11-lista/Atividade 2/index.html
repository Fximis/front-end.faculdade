<!DOCTYPE html>
<html>
<head>
    <title>lista ex 2</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.todo-app {
    text-align: center;
    max-width: 400px;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background-color: #fff;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

input{
  padding: 10px;
}
    </style>
</head>



<body>
    <div class="todo-app">
        <h2>Mostrador de temperatura</h2>
        <input type="number" id="celso" placeholder="bote um valo" oninput="celsiof()"><br><br>
        <input type="number" id="faro" placeholder="bote um valo" oninput="farenf()">
    </div>





    <script>
        const celsius = document.getElementById("celso");
        const farius = document.getElementById("faro");


function celsiof(){
  let c=celsius.value;
  let f= (c * 9/5) + 32              
  
  farius.value=f.toFixed(2);
}
  
  
  function farenf(){
  let f=farius.value;
  let c= (f - 32) * 5/9             
  
  celsius.value=c.toFixed(2);
  
}
    </script>




</body>
</html>
